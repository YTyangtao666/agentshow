name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Build widget
        run: npm run build --workspace @agentshow/widget

      - name: Run tests
        run: npm test

      - name: Verify widget bundle
        run: |
          if grep -c "require(" packages/widget/dist/entry-browser.global.js | grep -q "^0$"; then
            echo "✅ No Node.js require() in browser bundle"
          else
            echo "❌ Found require() in browser bundle"
            exit 1
          fi
